name: flutter_cv_app
description: A native AMOLED-styled mobile app for generating professional CVs using AI.
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  http: ^1.2.1
  image_picker: ^1.1.0
  pdf: ^3.10.8
  printing: ^5.13.0
  shared_preferences: ^2.2.3
  path_provider: ^2.1.2
  uuid: ^4.3.3
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  lottie: ^3.1.2
  flutter_cube: ^0.1.1
  purchases_flutter: ^10.1.1
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/3d/
